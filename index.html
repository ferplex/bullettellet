let state='idle',score=0,tLeft=15,tInt=null,aId=null,fr=0;
let bullets=[],jellies=[],eBullets=[],coins=[],expl=[],bgSt=[];
let jTimer=0,cTimer=0,touchX=null,bgY=0;
const pl={x:W/2,y:H-90,spd:5,fr:8,fc:0,left:false,right:false,inv:0,hp:3};
const keys={};

document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='ArrowLeft')pl.left=true;if(e.key==='ArrowRight')pl.right=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;if(e.key==='ArrowLeft')pl.left=false;if(e.key==='ArrowRight')pl.right=false;});
C.addEventListener('mousemove',e=>{if(state!=='playing')return;const r=C.getBoundingClientRect();touchX=e.clientX-r.left;});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect();touchX=e.touches[0].clientX-r.left;},{passive:false});

function initStars(){bgSt=[];for(let i=0;i<80;i++)bgSt.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.3,s:Math.random()*0.6+0.2,a:Math.random()*0.5+0.2});}

function drawBg(){
  bgY=(bgY+0.4)%H;
  if(imgB.complete&&imgB.naturalWidth>0){
    ctx.globalAlpha=0.5;
    ctx.drawImage(imgB,0,bgY-H,W,H);
    ctx.drawImage(imgB,0,bgY,W,H);
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle='#000510';ctx.fillRect(0,0,W,H);
  }
  ctx.fillStyle='rgba(0,0,10,0.5)';ctx.fillRect(0,0,W,H);
  if(imgC.complete&&imgC.naturalWidth>0){ctx.globalAlpha=0.12;ctx.drawImage(imgC,0,H-100,W,100);ctx.globalAlpha=1;}
  bgSt.forEach(s=>{s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W;}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(150,220,255,'+s.a+')';ctx.fill();});
}

function drawPlayer(){
  if(pl.inv>0&&Math.floor(fr/4)%2===0)return;
  ctx.save();ctx.translate(pl.x,pl.y);
  const gg=ctx.createRadialGradient(0,20,0,0,20,30);gg.addColorStop(0,'#ff008055');gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg;ctx.fillRect(-30,5,60,40);
  ctx.fillStyle='#0a1a2e';ctx.strokeStyle='#00cfff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-24);ctx.lineTo(16,8);ctx.lineTo(10,20);ctx.lineTo(-10,20);ctx.lineTo(-16,8);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#061428';ctx.strokeStyle='#0088cc';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-10,4);ctx.lineTo(-28,16);ctx.lineTo(-18,20);ctx.lineTo(-10,14);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,4);ctx.lineTo(28,16);ctx.lineTo(18,20);ctx.lineTo(10,14);ctx.closePath();ctx.fill();ctx.stroke();
  const cpg=ctx.createRadialGradient(0,-8,0,0,-8,10);cpg.addColorStop(0,'#00ffff');cpg.addColorStop(0.5,'#0066ff88');cpg.addColorStop(1,'transparent');
  ctx.fillStyle=cpg;ctx.beginPath();ctx.ellipse(0,-8,7,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#00cfff';ctx.fillRect(-2,-32,4,12);ctx.fillStyle='#ff0080';ctx.fillRect(-1,-34,2,3);
  const fh=12+Math.sin(fr*0.15)*6;
  const fg=ctx.createLinearGradient(0,20,0,20+fh);fg.addColorStop(0,'#ff6600');fg.addColorStop(0.5,'#ff0080');fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(-6,20);ctx.lineTo(0,20+fh);ctx.lineTo(6,20);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawJelly(j){
  ctx.save();ctx.translate(j.x,j.y);
  const pulse=Math.sin(fr*0.08+j.ph)*0.1+1;
  const sc=j.sc*pulse;
  const halo=ctx.createRadialGradient(0,0,10,0,0,36);
  halo.addColorStop(0,j.col+'55');halo.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(0,0,36*sc,0,Math.PI*2);ctx.fillStyle=halo;ctx.fill();
  if(imgJ.complete&&imgJ.naturalWidth>0){
    ctx.globalAlpha=0.9;
    ctx.drawImage(imgJ,-28*sc,-30*sc,56*sc,70*sc);
    ctx.globalAlpha=1;
  } else {
    ctx.beginPath();ctx.arc(0,0,20*sc,0,Math.PI*2);ctx.fillStyle=j.col+'aa';ctx.fill();
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();ctx.translate(b.x,b.y);
  ctx.fillStyle='#ff008066';ctx.fillRect(-2,4,4,12);
  ctx.fillStyle='#fff';ctx.shadowColor='#ff0080';ctx.shadowBlur=8;
  ctx.fillRect(-2,-8,4,14);ctx.shadowBlur=0;
  ctx.fillStyle='#ff0080';ctx.beginPath();ctx.arc(0,-8,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawCoin(c){
  ctx.save();ctx.translate(c.x,c.y);ctx.rotate(fr*0.05);
  ctx.shadowColor='#ffd700';ctx.shadowBlur=12;
  ctx.beginPath();
  for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*c.sz,Math.sin(a)*c.sz):ctx.lineTo(Math.cos(a)*c.sz,Math.sin(a)*c.sz);}
  ctx.closePath();ctx.fillStyle='#ffd700';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}

function drawEB(b){ctx.save();ctx.translate(b.x,b.y);ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle=b.col;ctx.shadowColor=b.col;ctx.shadowBlur=10;ctx.fill();ctx.restore();}

function drawExpl(){
  expl=expl.filter(e=>e.l>0);
  expl.forEach(e=>{e.l--;e.p.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.a-=0.04;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+p.c+','+Math.max(0,p.a)+')';ctx.fill();});});
}

function drawHP(){
  for(let i=0;i<pl.hp;i++){
    ctx.fillStyle='#ff0080';ctx.shadowColor='#ff0080';ctx.shadowBlur=6;
    const hx=16+i*22,hy=H-20;
    ctx.beginPath();ctx.moveTo(hx,hy-5);
    ctx.bezierCurveTo(hx,hy-9,hx-7,hy-9,hx-7,hy-4);
    ctx.bezierCurveTo(hx-7,hy,hx,hy+5,hx,hy+7);
    ctx.bezierCurveTo(hx,hy+5,hx+7,hy,hx+7,hy-4);
    ctx.bezierCurveTo(hx+7,hy-9,hx,hy-9,hx,hy-5);
    ctx.fill();ctx.shadowBlur=0;
  }
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}

function mkExpl(x,y,c){
  const p=[];
  for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;p.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*4,a:1,c});}
  expl.push({l:30,p});
}

const cols=['#ff00cc','#00ccff','#aa00ff','#00ff88','#ff6600'];
function spawnJ(){
  jellies.push({x:40+Math.random()*(W-80),y:-40,vx:(Math.random()-0.5)*1.5,vy:0.8+Math.random()*1.2,col:cols[Math.floor(Math.random()*cols.length)],ph:Math.random()*Math.PI*2,sc:0.6+Math.random()*0.5,hp:2,sc2:90+Math.floor(Math.random()*60),r:22});
}
function spawnC(){coins.push({x:30+Math.random()*(W-60),y:-20,vy:1.5+Math.random(),sz:10});}

function update(){
  fr++;
  if(touchX!==null){const d=touchX-pl.x;if(Math.abs(d)>3)pl.x+=d*0.12;}
  else{if(pl.left||keys['ArrowLeft'])pl.x-=pl.spd;if(pl.right||keys['ArrowRight'])pl.x+=pl.spd;}
  pl.x=Math.max(30,Math.min(W-30,pl.x));
  if(pl.inv>0)pl.inv--;
  if(pl.fc<=0){bullets.push({x:pl.x,y:pl.y-28,vy:-10});pl.fc=pl.fr;}
  pl.fc--;
  bullets=bullets.filter(b=>b.y>-10);
  bullets.forEach(b=>b.y+=b.vy);
  const sr=Math.max(28,90-(15-tLeft)*5);
  if(++jTimer>=sr){spawnJ();jTimer=0;}
  if(++cTimer>=180){spawnC();cTimer=0;}
  jellies.forEach(j=>{
    j.x+=j.vx;j.y+=j.vy;
    if(j.x<30||j.x>W-30)j.vx*=-1;
    j.sc2--;
    if(j.sc2<=0){
      const dx=pl.x-j.x,dy=pl.y-j.y,len=Math.sqrt(dx*dx+dy*dy);
      eBullets.push({x:j.x,y:j.y,vx:(dx/len)*2.5,vy:(dy/len)*2.5,col:j.col});
      j.sc2=90+Math.floor(Math.random()*60);
    }
  });
  bullets.forEach(b=>{
    jellies.forEach(j=>{
      if(dist(b,j)<j.r*j.sc+5){j.hp--;b.y=-100;if(j.hp<=0){mkExpl(j.x,j.y,'200,100,255');score+=10;document.getElementById('sv').textContent=score;j.y=H+100;}}
    });
  });
  eBullets.forEach(eb=>{
    if(pl.inv<=0&&dist(eb,pl)<20){pl.hp--;pl.inv=80;mkExpl(pl.x,pl.y,'255,0,128');eb.x=-100;if(pl.hp<=0)endGame();}
    eb.x+=eb.vx;eb.y+=eb.vy;
  });
  coins.forEach(c=>{c.y+=c.vy;if(dist(c,pl)<30){score+=25;document.getElementById('sv').textContent=score;mkExpl(c.x,c.y,'255,200,0');c.y=H+100;}});
  jellies=jellies.filter(j=>j.y<H+60);
  eBullets=eBullets.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
  coins=coins.filter(c=>c.y<H+30);
}

function draw(){drawBg();coins.forEach(drawCoin);jellies.forEach(drawJelly);bullets.forEach(drawBullet);eBullets.forEach(drawEB);drawExpl();drawPlayer();drawHP();}
function loop(){if(state!=='playing')return;update();draw();aId=requestAnimationFrame(loop);}

function startTimer(){
  tLeft=15;document.getElementById('tv').textContent=tLeft;
  tInt=setInterval(()=>{tLeft--;document.getElementById('tv').textContent=tLeft;if(tLeft<=0)endGame();},1000);
}

function startGame(){
  score=0;pl.x=W/2;pl.y=H-90;pl.hp=3;pl.inv=0;pl.fc=0;
  bullets=[];jellies=[];eBullets=[];coins=[];expl=[];jTimer=0;cTimer=0;fr=0;touchX=null;bgY=0;
  document.getElementById('sv').textContent='0';
  document.getElementById('ov').style.display='none';
  state='playing';startTimer();loop();
}

function endGame(){
  state='dead';clearInterval(tInt);cancelAnimationFrame(aId);
  const ov=document.getElementById('ov');ov.style.display='flex';
  ov.querySelector('h1').textContent='GAME OVER';
  ov.querySelector('.sub').textContent='// NEON STING //';
  document.getElementById('fs').style.display='block';
  document.getElementById('fs').textContent=score;
  document.getElementById('fl').style.display='block';
  document.getElementById('sb').textContent='REINTENTAR';
}

initStars();
draw();
document.getElementById('sb').addEventListener('click',startGame);
</script>
</body>
</html>
